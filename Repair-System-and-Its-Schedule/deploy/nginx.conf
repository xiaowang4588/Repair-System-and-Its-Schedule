# ============================================================
# 多媒体报修系统 - Nginx 反向代理 + HTTPS 配置
#
# 部署方式（宝塔面板）：
#   1. 宝塔面板 → 网站 → 添加站点 → 填写域名
#   2. 宝塔面板 → SSL → 申请 Let's Encrypt 免费证书
#   3. 将下面的配置粘贴到站点的 Nginx 配置中（替换 server 块）
#   4. 重启 Nginx
#
# 非宝塔环境：
#   1. 安装 Nginx + certbot
#   2. certbot certonly --nginx -d your-domain.com
#   3. 将此文件放到 /etc/nginx/conf.d/repair-system.conf
#   4. nginx -t && systemctl reload nginx
# ============================================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # Let's Encrypt 验证路径（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/course_query;
    }

    # 其他所有请求跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名

    # ============================================================
    # SSL 证书路径（宝塔面板会自动填入，手动部署请替换）
    # ============================================================
    ssl_certificate     /www/server/panel/vhost/cert/your-domain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（强制浏览器后续访问使用 HTTPS）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ============================================================
    # 安全响应头
    # ============================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # ============================================================
    # 反向代理 → Gunicorn (127.0.0.1:5000)
    # ============================================================
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传大小限制（与后端一致）
        client_max_body_size 50m;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 静态上传文件由 Nginx 直接服务（性能更好）
    location /uploads/ {
        alias /www/wwwroot/course_query/api-server/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # 上传目录禁止执行脚本
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # 禁止访问隐藏文件和敏感文件
    location ~ /\. {
        deny all;
    }
    location ~ \.(env|db|log|py|pyc|json)$ {
        deny all;
    }
}
