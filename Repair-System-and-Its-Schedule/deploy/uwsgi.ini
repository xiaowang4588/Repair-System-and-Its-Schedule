[uwsgi]
#项目目录
chdir=/www/wwwroot/course_query

#指定项目application
wsgi-file=/www/wwwroot/course_query/app.py

#python 程序内用以启动的application 变量名
callable=app

# 进程个数
processes=4

# 线程个数
threads=2

#指定启动时的pid文件路径（用于停止服务和重启服务，请勿删除）
pidfile=/www/wwwroot/course_query/uwsgi.pid

# 指定ip及端口
# 生产环境绑定 127.0.0.1，仅允许 Nginx 反向代理访问
# 开发环境可改为 0.0.0.0:5000
http=127.0.0.1:5000
#socket=0.0.0.0:5000

# ============================================================
# SSL 证书（不推荐直接由 uWSGI 提供 SSL）
# 生产环境请使用 Nginx 反向代理 + SSL（参见 deploy/nginx.conf）
# ============================================================
# https=0.0.0.0:443,/path/to/cert.pem,/path/to/key.pem

#启动uwsgi的用户名和用户组
uid=www
gid=www

#启用主进程
master=true

# 设置缓冲区大小
buffer-size = 32768

# 后台运行,并输出日志
daemonize = /www/wwwlogs/python/course_query/uwsgi.log

# 自定义设置项请写到该处, 
# 如果项目的启动方式您不想使用 wsgi-file 请注释掉,但不要删除，通讯方式(http, socket)同理;
# 最好以上面相同的格式 <注释 + 换行 + key = value> 进行书写，方便以后查阅

